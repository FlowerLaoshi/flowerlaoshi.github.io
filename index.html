<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Mayhem: 2D Array Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        body { font-family: 'Fira Code', monospace; }
        .matrix-cell { transition: all 0.2s; }
        .correct-flash { background-color: #22c55e !important; color: white; scale: 1.05; z-index: 10; }
        .target-row { background-color: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        .target-col { background-color: rgba(168, 85, 247, 0.2); border-color: #a855f7; }
        .helper-mode { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .time-add { animation: floatUp 1s ease-out forwards; color: #fb7185; font-weight: bold; position: absolute; z-index: 50; }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <!-- Header & Stats -->
    <div class="w-full max-w-4xl flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl shadow-2xl border border-slate-700">
        <div>
            <h1 class="text-2xl font-bold text-yellow-400 uppercase tracking-tighter">Matrix Mayhem</h1>
            <p id="level-display" class="text-xs text-emerald-400 font-bold uppercase">Level 1: Access</p>
        </div>
        <div class="flex gap-8 text-center relative">
            <div>
                <p class="text-xs uppercase text-slate-500">Score</p>
                <p id="score" class="text-2xl font-bold text-white">0000</p>
            </div>
            <div>
                <p class="text-xs uppercase text-slate-500">Streak</p>
                <p id="streak" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
            <div class="relative">
                <p class="text-xs uppercase text-slate-500">Time</p>
                <p id="timer" class="text-2xl font-bold text-rose-500">60s</p>
                <div id="time-bonus-anchor"></div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Left Column: The Visualizer -->
        <div id="visual-panel" class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg transition-colors">
            <h2 class="text-sm font-semibold text-slate-400 mb-4 font-mono">// Data: int[][] mat</h2>
            <div id="matrix-container" class="grid grid-cols-5 gap-2 mb-6">
                <!-- Matrix generated by JS -->
            </div>
            <div class="bg-slate-950 p-4 rounded-lg border border-slate-800 overflow-x-auto min-h-[160px] flex flex-col justify-center">
                <code id="code-snippet" class="text-blue-300 text-xs sm:text-sm whitespace-pre"></code>
            </div>
        </div>

        <!-- Right Column: The Challenge -->
        <div class="flex flex-col gap-4">
            <div id="challenge-box" class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex-grow flex flex-col justify-center text-center">
                <p class="text-slate-500 text-xs uppercase tracking-widest mb-4" id="question-type">Trace the Code</p>
                <h3 id="question-text" class="text-xl font-mono font-bold mb-8 text-white min-h-[3rem]"></h3>
                <div id="options-grid" class="grid grid-cols-2 gap-4">
                    <!-- Options generated by JS -->
                </div>
            </div>

            <div id="feedback" class="h-12 flex items-center justify-center rounded-lg text-lg font-bold"></div>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/95 flex items-center justify-center z-50 text-center p-6">
        <div class="max-w-md">
            <div class="mb-6 inline-block p-4 rounded-full bg-blue-500/10 border border-blue-500/20">
                <code class="text-blue-400 text-2xl font-bold">mat.length</code>
            </div>
            <h2 class="text-4xl font-black text-white mb-2 uppercase">Algorithm <span class="text-blue-500">Master</span></h2>
            <p class="text-slate-400 mb-8">Trace 2D array traversals, shifts, and logic checks. <br>Correct answers grant <strong>+20s</strong> time bonus!</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-bold text-xl transition-all active:scale-95 shadow-lg shadow-blue-900/40">START COMPILING</button>
        </div>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let timeLeft = 60;
        let currentMatrix = [];
        let currentAnswer = null;
        let timerInterval;
        let gameLevel = 1;

        const matrixContainer = document.getElementById('matrix-container');
        const visualPanel = document.getElementById('visual-panel');
        const questionText = document.getElementById('question-text');
        const questionTypeEl = document.getElementById('question-type');
        const levelDisplay = document.getElementById('level-display');
        const codeSnippetEl = document.getElementById('code-snippet');
        const optionsGrid = document.getElementById('options-grid');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const timerEl = document.getElementById('timer');
        const feedbackEl = document.getElementById('feedback');

        function generateMatrix() {
            currentMatrix = [];
            matrixContainer.innerHTML = '';
            for (let r = 0; r < 5; r++) {
                let row = [];
                for (let c = 0; c < 5; c++) {
                    let val = Math.floor(Math.random() * 9) + 1;
                    row.push(val);
                    let cell = document.createElement('div');
                    cell.className = `matrix-cell bg-slate-700/50 p-2 text-center rounded text-sm font-bold border border-slate-600 r-${r} c-${c} font-mono`;
                    cell.innerText = val;
                    cell.id = `cell-${r}-${c}`;
                    matrixContainer.appendChild(cell);
                }
                currentMatrix.push(row);
            }
        }

        function generateQuestion() {
            // Determine possible question types based on level
            let types = ['access'];
            if (streak >= 2 || gameLevel >= 2) {
                types.push('row_sum', 'col_sum', 'find_max', 'average', 'count_even');
                if (gameLevel < 2) { gameLevel = 2; levelDisplay.innerText = "Level 2: Algorithms"; }
            }
            if (streak >= 5 || gameLevel >= 3) {
                types.push('any_match', 'all_match', 'consecutive_pairs');
                if (gameLevel < 3) { gameLevel = 3; levelDisplay.innerText = "Level 3: Logic Patterns"; }
            }
            if (streak >= 10 || gameLevel >= 4) {
                types.push('row_shift', 'row_reverse', 'has_duplicates');
                if (gameLevel < 4) { gameLevel = 4; levelDisplay.innerText = "Level 4: Manipulations"; }
            }

            const type = types[Math.floor(Math.random() * types.length)];
            
            visualPanel.classList.remove('helper-mode');
            document.querySelectorAll('.matrix-cell').forEach(c => {
                c.classList.remove('target-row', 'target-col', 'correct-flash');
            });

            let r = Math.floor(Math.random() * 5);
            let c = Math.floor(Math.random() * 5);

            switch(type) {
                case 'access':
                    questionTypeEl.innerText = "Basic Indexing";
                    codeSnippetEl.innerText = `int result = mat[${r}][${c}];`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = currentMatrix[r][c];
                    break;

                case 'row_sum':
                    questionTypeEl.innerText = "Summation";
                    codeSnippetEl.innerText = `int result = 0;\nfor(int x : mat[${r}]) result += x;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = currentMatrix[r].reduce((a, b) => a + b, 0);
                    highlightRow(r);
                    break;

                case 'find_max':
                    questionTypeEl.innerText = "Selection (Max)";
                    codeSnippetEl.innerText = `int result = mat[${r}][0];\nfor(int x : mat[${r}])\n  if(x > result) result = x;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = Math.max(...currentMatrix[r]);
                    highlightRow(r);
                    break;

                case 'average':
                    questionTypeEl.innerText = "Aggregation (Avg)";
                    codeSnippetEl.innerText = `int sum = 0;\nfor(int x : mat[${r}]) sum += x;\nint result = sum / mat[${r}].length;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = Math.floor(currentMatrix[r].reduce((a,b)=>a+b, 0) / 5);
                    highlightRow(r);
                    break;

                case 'count_even':
                    questionTypeEl.innerText = "Counting Algorithm";
                    codeSnippetEl.innerText = `int result = 0;\nfor(int x : mat[${r}])\n  if(x % 2 == 0) result++;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = currentMatrix[r].filter(x => x % 2 === 0).length;
                    highlightRow(r);
                    break;

                case 'any_match':
                    let target = Math.floor(Math.random() * 9) + 1;
                    questionTypeEl.innerText = "Property Check (Any)";
                    codeSnippetEl.innerText = `boolean result = false;\nfor(int x : mat[${r}])\n  if(x == ${target}) result = true;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ? (1=T, 0=F)`;
                    currentAnswer = currentMatrix[r].includes(target) ? 1 : 0;
                    highlightRow(r);
                    break;

                case 'all_match':
                    questionTypeEl.innerText = "Property Check (All)";
                    codeSnippetEl.innerText = `boolean result = true;\nfor(int x : mat[${r}])\n  if(x < 5) result = false;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ? (1=T, 0=F)`;
                    currentAnswer = currentMatrix[r].every(x => x >= 5) ? 1 : 0;
                    highlightRow(r);
                    break;

                case 'consecutive_pairs':
                    questionTypeEl.innerText = "Consecutive Pairs";
                    codeSnippetEl.innerText = `int result = 0;\nfor(int i=0; i < mat[${r}].length-1; i++)\n  if(mat[${r}][i] == mat[${r}][i+1]) result++;`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ?`;
                    currentAnswer = 0;
                    for(let i=0; i<4; i++) if(currentMatrix[r][i] === currentMatrix[r][i+1]) currentAnswer++;
                    highlightRow(r);
                    break;

                case 'row_shift':
                    questionTypeEl.innerText = "Manipulation (Shift Left)";
                    codeSnippetEl.innerText = `// Shift row ${r} left by 1\nint result = mat[${r}][0]; // What was at index 0?`;
                    questionText.innerHTML = `Value at <span class="text-blue-400">mat[${r}][4]</span> after shift?`;
                    currentAnswer = currentMatrix[r][0]; // Logic for simple rotation shift
                    highlightRow(r);
                    break;

                case 'row_reverse':
                    questionTypeEl.innerText = "Manipulation (Reverse)";
                    codeSnippetEl.innerText = `// Reverse row ${r} in place\nint result = mat[${r}][0];`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> after reverse?`;
                    currentAnswer = currentMatrix[r][4];
                    highlightRow(r);
                    break;

                case 'has_duplicates':
                    questionTypeEl.innerText = "Duplicate Check";
                    codeSnippetEl.innerText = `boolean result = false;\n// Check for duplicates in row ${r}`;
                    questionText.innerHTML = `<span class="text-blue-400">result</span> == ? (1=T, 0=F)`;
                    currentAnswer = new Set(currentMatrix[r]).size !== currentMatrix[r].length ? 1 : 0;
                    highlightRow(r);
                    break;
            }

            renderOptions(currentAnswer, type);
        }

        function highlightRow(r) {
            document.querySelectorAll(`.r-${r}`).forEach(el => el.classList.add('target-row'));
        }

        function renderOptions(correct, type) {
            optionsGrid.innerHTML = '';
            let options = new Set([correct]);
            
            // Boolean style questions (1=True, 0=False)
            if (type.includes('match') || type === 'has_duplicates') {
                options.add(0);
                options.add(1);
            }

            while(options.size < 4) {
                let offset = Math.floor(Math.random() * 10) + 1;
                let opt = Math.random() > 0.5 ? correct + offset : correct - offset;
                if (opt >= 0) options.add(opt);
            }

            Array.from(options).sort(() => Math.random() - 0.5).forEach(opt => {
                let btn = document.createElement('button');
                btn.className = "bg-slate-700/50 hover:bg-slate-600 p-4 rounded-xl font-mono font-bold border border-slate-600 transition-all active:scale-95";
                
                if ((type.includes('match') || type === 'has_duplicates') && (opt === 0 || opt === 1)) {
                    btn.innerText = opt === 1 ? "true (1)" : "false (0)";
                } else {
                    btn.innerText = opt;
                }
                
                btn.onclick = () => checkAnswer(opt);
                optionsGrid.appendChild(btn);
            });
        }

        function showTimeBonus() {
            const anchor = document.getElementById('time-bonus-anchor');
            const bonus = document.createElement('div');
            bonus.className = 'time-add';
            bonus.innerText = '+20s';
            anchor.appendChild(bonus);
            setTimeout(() => bonus.remove(), 1000);
        }

        function checkAnswer(selected) {
            if (selected === currentAnswer) {
                timeLeft += 20;
                score += 100 + (streak * 20);
                streak++;
                showTimeBonus();
                feedbackEl.innerText = "SUCCESS: LOGIC VERIFIED";
                feedbackEl.className = "text-emerald-400 font-bold uppercase tracking-widest";
            } else {
                streak = 0;
                feedbackEl.innerText = "ERROR: EXPECTED " + (currentAnswer === 1 ? "true" : currentAnswer === 0 ? "false" : currentAnswer);
                feedbackEl.className = "text-rose-500 font-bold uppercase tracking-widest";
            }
            
            scoreEl.innerText = score.toString().padStart(4, '0');
            streakEl.innerText = streak;
            timerEl.innerText = timeLeft + "s";
            
            setTimeout(() => {
                generateMatrix();
                generateQuestion();
                feedbackEl.innerText = "";
            }, 800);
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            score = 0;
            streak = 0;
            gameLevel = 1;
            timeLeft = 60;
            scoreEl.innerText = "0000";
            streakEl.innerText = "0";
            levelDisplay.innerText = "Level 1: Access";
            generateMatrix();
            generateQuestion();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('overlay').innerHTML = `
                <div class="max-w-md bg-slate-800 p-8 rounded-2xl border border-slate-600 shadow-2xl">
                    <h2 class="text-4xl font-black text-rose-500 mb-2 uppercase">Execution Terminated</h2>
                    <p class="text-slate-400 mb-2 tracking-widest uppercase">Buffer Final Score</p>
                    <p class="text-6xl font-bold text-white mb-4">${score}</p>
                    <p class="text-blue-400 text-sm mb-8 font-bold">MAX STREAK: ${streak}</p>
                    <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-xl transition-all">REBOOT SYSTEM</button>
                </div>
            `;
        }
    </script>
</body>
</html>
